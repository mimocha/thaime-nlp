    g2p: "t"
    thai: "ต"
    variants: ["t"]
    notes: "removed [d/dt] to cut down on noise"
  th:
    rtgs: "th"
    g2p: "th"
    thai: "ท/ธ/ถ"
    variants: ["th", "t"]
    notes: ""
  tr:
