  nh:
    rtgs: "n"
    g2p: "nh"
    thai: "หน"
    variants: ["n", "nh"]
    notes: ""
  b:
    rtgs: "b"
    g2p: "b"
    thai: "บ"
    variants: ["b"]
    notes: "no common informal variants"
  p:
    rtgs: "p"
    g2p: "p"
    thai: "ป"
    variants: ["p"]
    notes: "removed [b/bp] to cut down on noise"
  ph:
    rtgs: "ph"
    g2p: "ph"
    thai: "พ/ผ"
    variants: ["ph", "p"]
    notes: ""
  phr:
    rtgs: "phr"
    g2p: "phr"
    thai: "พร"
    variants: ["phr", "pr"]
    notes: ""
  phl:
    rtgs: "phl"
    g2p: "phl"
    thai: "พล/ผล"
    variants: ["phl", "pl"]
    notes: ""
  pr:
    rtgs: "pr"
    g2p: "pr"
    thai: "ปร"
    variants: ["pr"]
    notes: "removed [br] to cut down on noise"
  pl:
