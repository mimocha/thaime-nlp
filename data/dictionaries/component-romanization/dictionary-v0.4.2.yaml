    g2p: "thr"
    thai: "ทร/ธร/ถร"
    variants: ["thr", "tr"]
    notes: "ทร is a notable case: TLTK g2p usually maps it to /s/ (e.g. ทราย)"
  n:
    rtgs: "n"
    g2p: "n"
    thai: "น"
    variants: ["n"]
