# ===========================================================================
# VOWELS (26 entries)
# ===========================================================================
# Vowel nuclei. Keys are TLTK g2p phoneme strings.
#
# TLTK g2p distinguishes ออ (O/OO, uppercase) from โอ (o/oo, lowercase).
# Short vowels use single letter, long vowels use doubled letter in g2p.
#
# Variant rationale codes:
#   lengthen = doubled spelling for long vowels (i->ee, u->oo)
#   alt-spell = alternative common spelling
#
# Note: vowel+glide diphthongs (aeo, io, eo, ui, oei) are NOT listed here.
# They are decomposed as vowel + coda (ae+w, i+w, e+w, u+y, oe+y).

vowels:
  a:
    rtgs: "a"
    g2p: "a"
    thai: "อะ"
    variants: ["a", "u"]
    notes: "removed [ah] to cut down on noise"
  aa:
    rtgs: "a"
    g2p: "aa"
    thai: "อา"
    variants: ["a", "aa", "ar"]
    notes: "removed [ah] to cut down on noise"
  e:
    rtgs: "e"
    g2p: "e"
    thai: "เอะ"
    variants: ["e"]
    notes: ""
  ee:
    rtgs: "e"
    g2p: "ee"
    thai: "เอ"
    variants: ["ee", "ay", "ae"]
    notes: "removed [e/eh] to cut down on noise"
  i:
    rtgs: "i"
    g2p: "i"
    thai: "อิ"
    variants: ["i"]
    notes: ""
  ii:
    rtgs: "i"
    g2p: "ii"
    thai: "อี"
    variants: ["ee", "ii"]
    notes: ""
  o:
    rtgs: "o"
    g2p: "o"
    thai: "โอะ"
    variants: ["o", "oh"]
    notes: ""
  oo:
    rtgs: "o"
    g2p: "oo"
    thai: "โอ"
    variants: ["o", "oh"]
    notes: ""
  O:
    rtgs: "o"
    g2p: "O"
    thai: "เอาะ"
    variants: ["o", "oh"]
    notes: "removed [or/oa] to cut down on noise, replaced with oh"
  OO:
    rtgs: "o"
    g2p: "OO"
    thai: "ออ"
    variants: ["or", "oh"]
    notes: "removed [o/aw] to cut down on noise"
  u:
    rtgs: "u"
    g2p: "u"
    thai: "อุ"
    variants: ["u"]
    notes: "removed [oo] to cut down on noise"
  uu:
    rtgs: "u"
    g2p: "uu"
    thai: "อู"
    variants: ["oo", "uu"]
    notes: ""
  ae:
    rtgs: "ae"
    g2p: "x"
    thai: "แอะ"
    variants: ["ae"]
    notes: "unable to disambiguate long/short sounds in romanization"
  aae:
    rtgs: "ae"
    g2p: "xx"
    thai: "แอ"
    variants: ["ae"]
    notes: "unable to disambiguate long/short sounds in romanization"
  ue:
    rtgs: "ue"
    g2p: "U"
    thai: "อึ"
    variants: ["ue", "uh"]
    notes: "unable to disambiguate long/short sounds in romanization"
  uee:
    rtgs: "ue"
    g2p: "UU"
    thai: "อือ"
    variants: ["ue", "uee", "uh"]
    notes: "unable to disambiguate long/short sounds in romanization"
  oe:
    rtgs: "oe"
    g2p: "@"
    variants: ["oe", "er"]
    thai: "เออะ"
    notes: ""
  oee:
    rtgs: "oe"
    g2p: "@@"
    thai: "เออ"
    variants: ["oe", "er", "ur"]
    notes: "uh from TLC/T2E, ur from McFarland"

  # Diphthongs (compound vowels handled as single units)
  ai:
    rtgs: "ai"
    g2p: "aj"
    thai: "ไอ/ใอ"
    variants: ["ai"]
    notes: ""
  ao:
    rtgs: "ao"
    g2p: "aw"
    thai: "เอา"
    variants: ["ao", "ow", "aow"]
    notes: ""
  ua:
    rtgs: "ua"
    g2p: "ua"
    thai: "อัว"
    variants: ["ua"]
    notes: ""
  uea:
    rtgs: "uea"
    g2p: "UUa"
    thai: "เอือ"
    variants: ["uea", "eua"]
    notes: "removed [ua] to cut down on noise"
  ia:
    rtgs: "ia"
    g2p: "iia"
    thai: "เอีย"
    variants: ["ia", "iia"]
    notes: ""
  oi:
    rtgs: "oi"
    g2p: "Oj"
    thai: "ออย"
    variants: ["oi", "oii"]
    notes: "removed oy (j->y pattern looks wrong in context)."
  iao:
    rtgs: "iao"
    g2p: "iiaw"
    thai: "เอียว"
    variants: ["iao", "eao", "eaw"]
    notes: ""
  uai:
    rtgs: "uai"
    g2p: "uaj"
    thai: "อวย"
    variants: ["uai", "uay"]
    notes: ""

# ===========================================================================
# CODAS (9 entries)
# ===========================================================================
# Final consonants. Keys are TLTK g2p phoneme strings.

codas:
  n:
    rtgs: "n"
    g2p: "n"
    thai: "น/ณ"
    variants: ["n"]
    notes: "no common informal variants"
  ng:
    rtgs: "ng"
    g2p: "N"
    thai: "ง"
    variants: ["ng"]
    notes: "no common informal variants"
  m:
    rtgs: "m"
    g2p: "m"
    thai: "ม"
    variants: ["m"]
    notes: "no common informal variants"
  t:
    rtgs: "t"
    g2p: "t"
    thai: "ด/ต/ถ/ท/ธ"
    variants: ["t", "d"]
    notes: ""
  s:
    rtgs: "t"
    g2p: "s"
    thai: "ศ/ษ/ส"
    variants: ["t", "s"]
    notes: "detected from Thai text when final consonant is ส/ศ/ษ (TLTK maps all to /t/)"
  c:
    rtgs: "t"
    g2p: "c"
    thai: "จ"
    variants: ["j"]
    notes: "removed [t/d] to cut down on noise"
  k:
    rtgs: "k"
    g2p: "k"
    thai: "ก/ข/ค/ฆ"
    variants: ["k", "g"]
    notes: ""
  p:
    rtgs: "p"
    g2p: "p"
    thai: "บ/ป/ผ/พ"
    variants: ["p", "b"]
    notes: "voicing common -- khrap->khrab"
  w:
    rtgs: "w"
    g2p: "w"
    thai: "ว"
    variants: ["w", "o", "u"]
    notes: "glide coda -- w (Haas), o (RTGS), u (Paiboon, after i: /iw/ -> iu)"
  y:
    rtgs: "y"
    g2p: "j"
    thai: "ย"
    variants: ["i"]
    notes: "glide coda -- g2p uses 'j' for ย coda. Removed y (looks like English in context)."
