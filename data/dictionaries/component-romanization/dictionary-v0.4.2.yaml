    variants: ["r"]
    notes: "enforce correct spelling (no r/l swap)"
  l:
    rtgs: "l"
    g2p: "l"
    thai: "ล"
    variants: ["l"]
    notes: "enforce correct spelling (no r/l swap)"
  w:
    rtgs: "w"
