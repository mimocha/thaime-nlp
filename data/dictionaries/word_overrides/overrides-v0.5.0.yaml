# Manual romanization overrides for the trie pipeline.
#
# Words listed here are merged into the trie dataset after variant generation.
# Use this for:
#   - Legitimate words that TLTK cannot romanize (colloquial particles, slang)
#   - Words filtered out by aggressive regex rules but still valid
#   - Loanwords with non-standard romanization (small-scale; bulk loanwords
#     are deferred to pipeline/trie-loanwords)
#
# Format:
#   thai_word:
#     - romanization1
#     - romanization2
#
# Words here bypass both the word filter and the variant generator.
# Keep this file small and curated -- it is maintained by hand.

